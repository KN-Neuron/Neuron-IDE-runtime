syntax = "proto3";

package NeuronIDE;

message SpriteRenderer {
  string texture_path = 1;
  string img_path = 2;
}

message TextRenderer {
  string text = 1;
  string font_path = 2;
  uint32 font_size = 3;
}

message BlinkComponent  {
  double blink_frequency_hz = 1;
}

message ScriptComponent {
  string script_path = 1;
}

message Transform {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
  double rotation = 5;
}

message Component {
  oneof component_type {
    SpriteRenderer renderer = 1;
    TextRenderer text = 2;
    BlinkComponent blinker = 3;
    ScriptComponent script = 4;
  }
}

message SceneObject  {
  string name = 1;
  bool is_visible = 2;
  Transform transform = 3;
  repeated Component components = 4;
}

message Scene {
  string project_name = 1;
  repeated SceneObject scene_objects = 2;
}